- name: 첫 연결 테스트
  hosts: server
  tasks:
    - name: Ping 테스트
      ping:

    - name: 서버 uptime 확인
      command: uptime

    - name: Docker 설치
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Docker GPG 키 추가 및 repo 등록
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu focal stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Docker Engine 설치
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: latest
        update_cache: yes

    - name: Docker 그룹에 ubuntu 사용자 추가
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: AWS CLI v2 설치
      shell: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        apt install unzip -y
        unzip awscliv2.zip
        ./aws/install
      args:
        creates: /usr/local/bin/aws

    - name: Java 설치 (Jenkins 의존성)
      apt:
        name: openjdk-11-jdk
        state: present

    - name: Jenkins GPG 키 및 repo 등록
      apt_key:
        url: https://pkg.jenkins.io/debian/jenkins.io.key
        state: present

    - name: Jenkins repo 추가
      apt_repository:
        repo: deb https://pkg.jenkins.io/debian binary/
        state: present

    - name: Jenkins 설치
      apt:
        name: jenkins
        state: present
        update_cache: yes
    
    - name: Jenkins 사용자를 docker 그룹에 추가
      user:
        name: jenkins
        groups: docker
        append: yes


    - name: Jenkins 서비스 시작 및 부팅 시 활성화
      service:
        name: jenkins
        state: started
        enabled: true
    
    - name: Jenkins 초기 admin password 출력
      shell: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_admin_pw
      changed_when: false

    - name: 초기 admin password 출력
      debug:
        msg: "Jenkins 초기 비밀번호: {{ jenkins_admin_pw.stdout }}"

    - name: Terraform 설치
      shell: |
        curl -fsSL https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip -o terraform.zip
        unzip terraform.zip
        mv terraform /usr/local/bin/
      args:
        creates: /usr/local/bin/terraform

    - name: Ansible 재설치
      apt:
        name: ansible
        state: present
        update_cache: yes